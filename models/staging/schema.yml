version: 2

models:
  - name: stg_yellow_trips
    description: >
      Staging model for raw yellow taxi trips. One row per trip.
      Grain: trip_id — surrogate key (MD5 of vendor_id | pickup_datetime | pickup_location_id).
      Scope: filtered to data_file_year = var('taxi_load_year').
      All NUMERIC source columns cast to FLOAT. Location IDs cast from STRING to INT.
      Indicator fields (_ind) use 1/0 convention: sum()=count, avg()=rate.
      NULL batch: ~3.43% of 2022 rows have simultaneous NULLs on passenger_count,
      rate_code, store_and_fwd_flag — flagged with is_null_batch_ind, retained.
    columns:
      - name: trip_id
        description: 'Surrogate PK. MD5 hash of vendor_id|pickup_datetime|pickup_location_id'
        tests: 
          - not_null
          - unique:
              config: 
                severity: warn
      - name: pickup_datetime
        tests: [not_null]
      - name: pickup_date
        tests: [not_null]
      - name: pickup_location_id
        description: 'Cast from STRING to INT. 262–263 distinct values.'
        tests: [not_null]
      - name: dropoff_location_id
        tests: [not_null]
      - name: passenger_count
        description: 'NULL = 0-passenger records coerced to NULL at staging. Valid range 1–6.'
        tests:
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 6
              inclusive: true        
      - name: fare_amount
        tests: [not_null]
      - name: total_amount
        tests: [not_null]
      - name: passenger_count_missing_ind
        tests:
          - not_null
          - accepted_values: 
              arguments:
                values: [0, 1]
      - name: fare_exception_ind
        tests:
          - not_null
          - accepted_values: 
              arguments:
                values: [0, 1]
      - name: trip_distance_miles_exception_ind
        tests:
          - not_null
          - accepted_values: 
              arguments:
                values: [0, 1]
      - name: airport_pickup_ind
        tests:
          - not_null
          - accepted_values: 
              arguments:
                values: [0, 1]
      - name: airport_dropoff_ind
        tests:
          - not_null
          - accepted_values: 
              arguments:
                values: [0, 1]
      - name: jfk_flat_rate_ind
        tests:
          - not_null
          - accepted_values: 
              arguments:
                values: [0, 1]
      - name: is_null_batch_ind
        tests:
          - not_null
          - accepted_values: 
              arguments:
                values: [0, 1]
      - name: payment_type
        tests:
          - accepted_values: 
              arguments:
                values: [1, 2, 3, 4, 5]
      - name: payment_type_label
        tests:
          - accepted_values:
              arguments:
                values: ['credit_card', 'cash', 'no_charge', 'dispute', 'unknown']
      - name: rate_code_id
        description: 'NULL = unknown/sentinel (99 coerced to NULL at staging)'
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6]

  - name: stg_taxi_zones
    description: '265 NYC taxi zones from the TLC zone lookup seed.'
    columns:
      - name: location_id
        tests: [not_null, unique]
      - name: borough
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['manhattan', 'brooklyn', 'queens', 'bronx', 'staten island', 'ewr', 'n/a', 'unknown']

  - name: stg_weather
    description: 'NOAA GHCN-Daily — Central Park (USW00094728). One row per calendar date.'
    columns:
      - name: date
        tests: [not_null, unique]
      - name: temp_max_f
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -40
                max_value: 120
      - name: temp_min_f
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -40
                max_value: 120
      - name: temp_avg_f
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -40
                max_value: 120
      - name: precipitation_in
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 10   # NYC record is ~8in in a day
      - name: snowfall_in
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 30   # NYC record ~26in (1947 blizzard)
      - name: snow_depth_in
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 40
      - name: avg_wind_speed_mph
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100  # hurricane-force would be extraordinary for NYC
